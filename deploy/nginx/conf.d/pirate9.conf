server {
    listen 80;
    listen [::]:80;
    server_name pirate9.mineraltown.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pirate9.mineraltown.net;
    charset utf-8;

    http2 on;

    ssl_certificate /etc/ssl/mineraltown.net/fullchain.pem;
    ssl_certificate_key /etc/ssl/mineraltown.net/privkey.pem;
    add_header Strict-Transport-Security "max-age=63072000" always;
    server_tokens off;

    root /var/www/pirate9;
    index index.html;
}
